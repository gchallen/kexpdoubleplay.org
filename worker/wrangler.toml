name = "kexpdoubleplays-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[triggers]
crons = ["*/5 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "kexpdoubleplays"
database_id = "62b03af4-7cee-40e0-8c9b-3f202fb26990"
migrations_dir = "migrations"

[vars]
NOTIFICATION_EMAIL = "geoffrey.challen@gmail.com"
RESEND_FROM_EMAIL = "noreply@kexpdoubleplays.org"
KEXP_API_BASE_URL = "https://api.kexp.org/v2"

# Secrets (set via `wrangler secret put <NAME>`):
# RESEND_API_KEY — Resend API key for email notifications
# ADMIN_TOKEN — Bearer token for write endpoints (PUT youtube_id, etc.)

# Custom domain: configure in Cloudflare dashboard
# Workers & Pages -> kexpdoubleplays-api -> Settings -> Domains & Routes
