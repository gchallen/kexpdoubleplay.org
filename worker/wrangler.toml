name = "kexpdoubleplays-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"

routes = [
  { pattern = "kexpdoubleplays.org", custom_domain = true },
  { pattern = "www.kexpdoubleplays.org", custom_domain = true },
]

[triggers]
crons = ["*/5 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "kexpdoubleplays"
database_id = "62b03af4-7cee-40e0-8c9b-3f202fb26990"
migrations_dir = "migrations"

[vars]
NTFY_TOPIC = "kexpdoubleplays-f0b346e8"
KEXP_API_BASE_URL = "https://api.kexp.org/v2"

# Secrets (set via `wrangler secret put <NAME>`):
# ADMIN_TOKEN — Bearer token for write endpoints (PUT youtube_id, etc.)
